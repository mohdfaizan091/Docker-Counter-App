services:
  counter-app:
    build: .
    depends_on:
      - redis
    deploy:
      replicas: 3

  redis:
    image: redis:7
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - counter-app

volumes:
  redis-data: